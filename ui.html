<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <style>
           :root {
           --bg: #2C2C2C;
           --surface: #383838;
           --surface-hover: #444;
           --text: #E8E8E8;
           --text-secondary: #A0A0A0;
           --border: #505050;
           --accent: #0D99FF;
           --panic: #FF3B30;
           --change: #FF9F0A;
           --nitpick: #8E8E93;
           --addressed: #30D158;
           --dismissed: #555;
           }
            * { margin: 0; padding: 0; box-sizing: border-box; }
             body {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: var(--bg);
                color: var(--text);
                font-size: 12px;
                line-height: 1.4;
                overflow-x: hidden;
             }
             .header {
                padding: 16px 16px 12px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 10px;
             }
             .header h1 {
                font-size: 13px;
                font-weight: 600;
                flex: 1;
             }
             .header .badge {
                font-size: 10px;
                background: var(--surface);
                padding: 2px 8px;
                border-radius: 4px;
                color: var(--text-secondary);
             }
             .content {
                padding: 12px 16px 24px;
             }
             .empty-state {
              text-align: center;
              padding: 48px 20px;
              color: var(--text-secondary);
             }
         .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
         .empty-state h3 {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 6px;
         }
         .empty-state p {
            font-size: 12px;
            line-height: 1.5;
         }    
        .toolbar {
        padding: 12px 16px;
        display: flex;
        gap: 8px;
        border-bottom: 1px solid var(--border);
        }
        .btn{
        padding: 8px 16px;
        border-radius: 6px;
        border: none;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        }
        .btn-primary{
        background: var(--accent);
        color: #fff;
        flex: 1;
        justify-content: center;
        }
        .btn-primary:hover { background: #1AA3FF }
          .btn-primary:disabled { opacity: 0.5; cursor: default; }
         @keyframes fadeSlideIn {
              from { opacity: 0; transform: translateY(12px); }
              to   { opacity: 1; transform: translateY(0); }
            }
          .feedback-list {
          display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .feedback-card{
            background: var(--surface);
            border-radius: 8px;
            padding: 12px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            animation: fadeSlideIn 0.25s ease-out both;
          }        
      .feedback-card:nth-child(1) { animation-delay: 0.02s; }
      .feedback-card:nth-child(2) { animation-delay: 0.06s; }
      .feedback-card:nth-child(3) { animation-delay: 0.10s; }
      .feedback-card:nth-child(4) { animation-delay: 0.14s; }
      .feedback-card:nth-child(5) { animation-delay: 0.18s; }
      .feedback-card:nth-child(6) { animation-delay: 0.22s; }
      .feedback-card:nth-child(7) { animation-delay: 0.26s; }
      .feedback-card:nth-child(8) { animation-delay: 0.30s; }
      .feedback-card:nth-child(9) { animation-delay: 0.34s; }
      .feedback-card:nth-child(10) { animation-delay: 0.38s; }
      .feedback-card:nth-child(11) { animation-delay: 0.42s; }
      .feedback-card:nth-child(12) { animation-delay: 0.46s; }
      .feedback-card:nth-child(13) { animation-delay: 0.50s; }
      .feedback-card:nth-child(14) { animation-delay: 0.54s; }
      .feedback-card:nth-child(15) { animation-delay: 0.58s; }
      .feedback-card.severity-panic { border-left-color: var(--panic); }
      .feedback-card.severity-change-request { border-left-color: var(--change); };
      .feedback-card.severity-nitpick { border-left-color: var(--nitpick); }
      .feedback-card.status-dismissed { opacity: 0.5; }
      .feedback-card-status-addressed{ opacity: 0.7; }
      .feedback-card.status-addressed .feedback-text { text-decoration: line-through; }
     .feedback-actions {
      display: flex;
     gap: 4px;
     flex-wrap: wrap;
     }
     .btn-small {
     padding: 4px 8px;
     font-size: 11px;
     border-radius: 4px;
     border: none;
     cursor: pointer;
    transition: all 0.15s;
    }
     .btn-dismiss { background: var(--dismissed); color: #ccc; }
         .btn-dismiss:hover { background: #666; }
         .btn-address { background: var(--addressed); color: #fff; }
         .btn-address:hover { background: #40E868; }
         .btn-revert { background:var(--surface); color: var(--text); border: 1px solid var(--border); padding: 4px 8px; font-size: 11px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
         .btn-revert:hover { background: var(--surface-hover); }
         .status-tag {
           font-size: 9px;
           padding: 1px 6px;
           border-radius: 3px;
           text-transform: uppercase;
           letter-spacing: 0.3px;
         }
      .feedback-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      }
      .category-badge{
         font-size: 10px;
         font-weight: 600;
         padding: 2px 6px;
         border-radius: 3px;
         background: var(--bg);
         color: var(--text-secondary);
      }
       .severity-badge {
            font-size: 9px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
          }
         .feedback-card.severity-panic .severity-badge { background: rgba(255,59,48,0.2); color: var(--panic); }
            .feedback-card.severity-change-request .severity-badge { background: rgba(255,159,10,0.2); color: var(--change); }
            .feedback-card.severity-nitpick .severity-badge { background: rgba(142,142,147,0.2); color: var(--nitpick); }
            .feedback-card.status-addressed .status-tag { background: rgba(48,209,88,0.2); color: var(--addressed); }
            .feedback-card.status-dismissed .status-tag { background: rgba(85,85,85,0.3); color: #999; }
        .feedback-text {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 8px;
            color: var(--text);
        }
        </style>
         </head>
         <body>
            <div class="header">
                <h1>&#x1F4AC; Client Feedback</h1>
                <span class="badge" id="counter">0 notes</span>
              </div>
            
          <div class="toolbar">
           <button class="btn btn-primary" id="generateBtn">&#x1F3AF; Generate Feedback</button>
          </div>
          
              <div class="content">
                <div class="empty-state" id="emptyState">
                  <div class="icon">&#x1F4AD;</div>
                  <h3>Ready to get roasted?</h3>
                  <p>Select some layers or a frame, then click <strong>Generate Feedback</strong> to see what your "client" would say.</p>
                </div>
             
            <div class="feedback-list" id="feedbackList" style="display:none"></div>
            </div>
            
           <script>
         const generateBtn = document.getElementById('generateBtn');
            const feedbackList = document.getElementById('feedbackList');
            const emptyState = document.getElementById('emptyState');
            const counter = document.getElementById('counter');
            let items = [];
        
        function onmessage(event) {
           const msg = event.data.pluginMessage || event.data;
           if(msg.type === 'feedback') {
            items = msg.items || [];
        render();
           }
        }
        window.addEventListener('message', onmessage);
        
        generateBtn.addEventListener('click', () => {
         parent.postMessage({ pluginMessage: { type: 'generate' } }, '*');
            });
        
        function render() {
        var activeCount = items.filter(function(i) { return i.status === 'active'; }).length;
             var doneCount = items.length - activeCount;
             counter.textContent = doneCount > 0
               ? items.length + ' notes (' + activeCount + ' active, ' + doneCount + ' done)'
               : items.length + ' notes';
        
         if (items.length === 0) {
                emptyState.style.display = 'block';
                feedbackList.style.display = 'none';
                return;
              }
        
        emptyState.style.display = 'none';
        feedbackList.style.display = 'flex';
        
              let html = '';
              for (const item of items) {
                 const severityClass = 'severity-' + item.severity.replace(/\s+/g, '-');
                  const statusClass = 'status-' + item.status;      
                 const sevLabel = item.severity === 'panic' ? '\u{1F534}' : item.severity === 'change request' ? '\u{1F7E1}' : '\u{26AA}';
                      
                       let actionsHtml = '';
                              if (item.status === 'active') {
                                actionsHtml = '<button class="btn-small btn-dismiss" data-id="' + item.id + '" data-action="dismiss">Dismiss</button>' +
                                  '<button class="btn-small btn-address" data-id="' + item.id + '" data-action="address">Mark Addressed</button>';
                              } else if (item.status === 'dismissed') {
                            actionsHtml = '<span class="status-tag">Dismissed</span>' +
                                       '<button class="btn-revert" data-id="' + item.id + '" data-action="readdress">Revert</button>';
                              } else if (item.status === 'addressed') {
                            actionsHtml = '<span class="status-tag">Addressed</span>' +
                            '<button class="btn-revert" data-id="' + item.id + '" data-action="readdress">Revert</button>';
                              }
                 
                              html += '<div class="feedback-card ' + severityClass + ' ' + statusClass + '">' +
                          '<div class="feedback-header">' +
                          '<span class="severity-badge">' + sevLabel + ' ' + item.severity + '</span>' +
                          '<span class="category-badge">' + escHtml(item.category) + '</span>' +
                          '</div>' +
                  '<div class="feedback-text">' + escHtml(item.text) + '</div>' +
                    '<div class="feedback-actions">' + actionsHtml + '</div>' +
                  '</div>';
              }
              feedbackList.innerHTML = html;
           
           feedbackList.querySelectorAll('button[data-action]').forEach(function(btn) {
                   btn.addEventListener('click', function() {
                     var id = btn.getAttribute('data-id');
                     var action = btn.getAttribute('data-action');
                     parent.postMessage({ pluginMessage: { type: action, id: id } }, '*');
                   });
                 });
            }
          
            function escHtml(s) {
              const d = document.createElement('div');
              d.textContent = s;
              return d.innerHTML;
            }
          </script>
        </body>
            </html>
